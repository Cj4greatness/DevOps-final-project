name: DevOps Final Project CI/CD

on:
  push:
    branches: [main]

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java app
        working-directory: ./java-app
        run: mvn clean package -DskipTests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test portfolio app
        working-directory: ./portfolio-app
        run: |
          pip install -r requirements.txt
          python3 -c "from app import app; c = app.test_client(); r = c.get('/health'); assert r.status_code == 200; print('OK')"

  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and rsync
        run: |
          pip install ansible
          sudo apt-get install -y rsync

      - name: Write SSH key
        run: |
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > /tmp/chisom-key.pem
          chmod 400 /tmp/chisom-key.pem
          head -1 /tmp/chisom-key.pem

      - name: Write inventory
        run: |
          cat > ansible/inventory/hosts.ini << INV
          [app_servers]
          app01 ansible_host=${{ secrets.EC2_HOST }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/chisom-key.pem

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          INV

      - name: Run Ansible playbook
        working-directory: ./ansible
        run: ansible-playbook -i inventory/hosts.ini playbook.yml -v

  verify:
    name: Verify Apps
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check Portfolio
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:80)
          echo "Portfolio status: $STATUS"

      - name: Check Java App
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8080)
          echo "Java App status: $STATUS"

      - name: Print URLs
        run: |
          echo "================================"
          echo "Portfolio: http://${{ secrets.EC2_HOST }}:80"
          echo "Java App:  http://${{ secrets.EC2_HOST }}:8080"
          echo "================================"
