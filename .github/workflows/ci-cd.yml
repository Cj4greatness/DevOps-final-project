name: DevOps Final Project CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Java app with Maven
        working-directory: ./java-app
        run: mvn clean package -DskipTests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install portfolio dependencies
        working-directory: ./portfolio-app
        run: pip install -r requirements.txt

      - name: Test portfolio health endpoint
        working-directory: ./portfolio-app
        run: |
          python3 -c "
          from app import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200
          print('Portfolio health check passed!')
          "

  # ─────────────────────────
  # JOB 2: Provision with Terraform
  # ─────────────────────────
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_key_name: chisom-key
          TF_VAR_my_ip: "0.0.0.0/0"
        run: terraform apply -auto-approve

  # ─────────────────────────
  # JOB 3: Deploy with Ansible
  # ─────────────────────────
  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/chisom-key.pem
          chmod 400 /tmp/chisom-key.pem

      - name: Write Ansible inventory
        run: |
          cat > ansible/inventory/hosts.ini << INVENTORY
          [app_servers]
          app01 ansible_host=${{ secrets.EC2_HOST }} ansible_user=ubuntu ansible_ssh_private_key_file=/tmp/chisom-key.pem

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          INVENTORY

      - name: Wait for EC2 to be ready
        run: |
          for i in {1..20}; do
            ssh -o StrictHostKeyChecking=no \
                -i /tmp/chisom-key.pem \
                ubuntu@${{ secrets.EC2_HOST }} \
                'echo ready' && break
            echo "Attempt $i — waiting 15s..."
            sleep 15
          done

      - name: Run Ansible playbook
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventory/hosts.ini playbook.yml -v

  # ─────────────────────────
  # JOB 4: Verify Deployment
  # ─────────────────────────
  verify:
    name: Verify Both Apps
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check Portfolio App
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:80)
            if [ "$STATUS" = "200" ]; then
              echo "Portfolio App is UP - HTTP $STATUS"
              break
            fi
            echo "Attempt $i - got $STATUS, retrying in 15s..."
            sleep 15
          done

      - name: Check Java App
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8080)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Java App Tomcat is UP - HTTP $STATUS"
              break
            fi
            echo "Attempt $i - got $STATUS, retrying in 15s..."
            sleep 15
          done

      - name: Print Live URLs
        run: |
          echo "=================================="
          echo "DEPLOYMENT SUCCESSFUL!"
          echo "Portfolio: http://${{ secrets.EC2_HOST }}:80"
          echo "Java App:  http://${{ secrets.EC2_HOST }}:8080"
          echo "=================================="
