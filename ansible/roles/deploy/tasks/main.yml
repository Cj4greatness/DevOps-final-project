---
- name: Create project directory
  file:
    path: /home/ubuntu/devops-app
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy portfolio app (skip venv)
  synchronize:
    src: "{{ playbook_dir }}/../portfolio-app/"
    dest: /home/ubuntu/devops-app/portfolio-app/
    rsync_opts:
      - "--exclude=venv/"
      - "--exclude=__pycache__/"
      - "--exclude=*.pyc"

- name: Copy java app (skip target)
  synchronize:
    src: "{{ playbook_dir }}/../java-app/"
    dest: /home/ubuntu/devops-app/java-app/
    rsync_opts:
      - "--exclude=target/"
      - "--exclude=.git/"

- name: Copy docker-compose file
  copy:
    src: "{{ playbook_dir }}/../docker-compose.yml"
    dest: /home/ubuntu/devops-app/docker-compose.yml
    owner: ubuntu
    group: ubuntu

- name: Build and start both apps
  shell: |
    cd /home/ubuntu/devops-app
    docker compose up --build -d
  become: yes

- name: Wait for portfolio app
  wait_for:
    host: localhost
    port: 80
    delay: 10
    timeout: 180

- name: Wait for java app
  wait_for:
    host: localhost
    port: 8080
    delay: 10
    timeout: 180
