version: '3.9'

services:

  portfolio:
    build:
      context: ./portfolio-app
      dockerfile: Dockerfile
    container_name: portfolio-app
    ports:
      - "80:5000"
    restart: unless-stopped

  java-app:
    build:
      context: ./java-app
      dockerfile: Dockerfile
    container_name: java-app
    ports:
      - "8080:8080"
    restart: unless-stopped